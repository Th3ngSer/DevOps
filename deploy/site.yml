---
- name: Deploy Laravel app
  hosts: web
  vars:
    deploy_path: "{{ deploy_path | default('/root/i42026-website') }}"
  tasks:
    - name: Ensure deploy path exists
      file:
        path: "{{ deploy_path }}"
        state: directory

    - name: Sync application files
      synchronize:
        src: "{{ playbook_dir }}/.."
        dest: "{{ deploy_path }}"
        delete: true
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=node_modules"
          - "--exclude=vendor"
          - "--exclude=.env"
          - "--exclude=storage/logs"
          - "--exclude=storage/framework/cache"
          - "--exclude=storage/framework/sessions"
          - "--exclude=storage/framework/views"

    - name: Install PHP dependencies
      command: composer install --no-interaction --prefer-dist
      args:
        chdir: "{{ deploy_path }}"

    - name: Generate app key
      command: php artisan key:generate --force
      args:
        chdir: "{{ deploy_path }}"
