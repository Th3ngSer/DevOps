services:
  jenkins:
    image: jenkins/jenkins:lts
    privileged: true
    user: root
    ports:
      - 8080:8080 # for jenkins web interface
      - 50000:50000 # for jenkins slave agents (runners)
    container_name: jenkins-tp01-I4C
    volumes:
      - "jenkins_home:/var/jenkins_home" # persist jenkins data
    links:
      - "laravel-agent:laravel"
  laravel-agent:
    build: ./laravel-agent
    image: i4c/jenkins-agent:latest
    container_name: jenkins-laravel-agent-I4C
    environment:
      - JENKINS_URL=http://jenkins:8080
      - JENKINS_AGENT_NAME=laravel-agent-I4C
      - JENKINS_AGENT_SSH_

    ports:
      - 2222:22 # for SSH access to the agent

volumes:
  jenkins_home: